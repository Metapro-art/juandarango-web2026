  <style>

    /* ── NAV BRAND NAME ── */
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }

    /* On very small screens hide the brand text so nav links fit */
    @media (max-width: 420px) {
      .nav-brand { display: none; }
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 1.25rem 3rem;
      text-align: center;
    }

    /* Photo frame */
    .hero-photo-wrap {
      position: relative;
      /* fluid: grows to 250px max, shrinks on small screens */
      width: min(250px, 72vw);
      aspect-ratio: 250 / 318;
      margin-bottom: 2rem;
      animation: fadeUp 0.9s ease both;
      flex-shrink: 0;
    }
    .hero-photo-wrap::before {
      content: ''; position: absolute; inset: -1px;
      border: 1px solid #2a2a2a; pointer-events: none; z-index: 1;
    }
    .hero-photo-wrap::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 45%;
      background: linear-gradient(to top, var(--bg) 5%, transparent);
      z-index: 2;
    }
    .hero-photo {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 15%;
      display: block; filter: grayscale(10%);
    }

    /* Text block */
    .hero-content { animation: fadeUp 0.9s 0.2s ease both; width: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 6.5vw, 3.4rem);
      font-weight: 300; letter-spacing: 0.18em;
      color: #fff; text-transform: uppercase; line-height: 1;
    }
    .hero-sub {
      margin-top: 0.65rem; font-size: clamp(0.55rem, 1.8vw, 0.65rem);
      font-weight: 500; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--accent);
    }
    .hero-divider {
      width: 28px; height: 1px; background: var(--accent);
      margin: 1.4rem auto; opacity: 0.5;
    }

    /* Button column */
    .btn-group {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem;
      animation: fadeUp 0.9s 0.32s ease both;
      width: 100%;
    }
    .hero-btn {
      display: flex; align-items: center; justify-content: center;
      /* fluid width: fills screen on mobile, caps at 252px on desktop */
      width: min(252px, 88vw);
      padding: 0.72rem 1.5rem; min-height: 46px;
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.68rem);
      font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; text-decoration: none;
      color: var(--text); border: 1px solid var(--border);
      background: transparent; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .hero-btn:hover,
    .hero-btn:active { border-color: var(--accent); background: var(--accent-dim); color: #fff; }
    .hero-btn-accent { border-color: rgba(200,146,58,0.5); color: var(--accent); }

    /* Subscribe section below hero */
    .subscribe-section {
      max-width: 400px; width: 100%;
      margin: 0 auto; padding: 2.5rem 1.25rem 5rem;
      border-top: 1px solid var(--border);
    }
    .subscribe-section .label { margin-bottom: 1.2rem; }
    .subscribe-form {
      display: flex; flex-direction: column; gap: 0.65rem; width: 100%;
    }
    /* inputs: 1rem font-size prevents iOS auto-zoom */
    .form-input {
      background: #111; border: 1px solid var(--border); color: var(--text);
      padding: 0.75rem 1rem; font-family: 'Raleway', sans-serif;
      font-size: 1rem; width: 100%; outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none; border-radius: 0;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); font-size: 0.88rem; }
    .subscribe-note { font-size: 0.68rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.5; }


    /* ── HERO SOCIAL ICONS ROW ── */
    .hero-socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      /* same width as the buttons above */
      width: min(252px, 88vw);
      /* match the button border to visually frame them */
      border: 1px solid var(--border);
      padding: 0.55rem 0;
      margin-top: 0;
    }
    .hero-social-link {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      color: var(--muted);
      border-bottom: none !important;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .hero-social-link:hover,
    .hero-social-link:active { color: var(--accent); }
    .hero-social-link svg {
      width: 18px; height: 18px; fill: currentColor;
      pointer-events: none;
    }

    /* Tighten subscribe padding on small screens */
    @media (max-width: 480px) {
      .hero { padding-top: 72px; padding-bottom: 2rem; }
      .hero-sub { letter-spacing: 0.2em; }
      .subscribe-section { padding: 2rem 0.5rem 4rem; }
    }
  </style>
